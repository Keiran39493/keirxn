<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NGO Match Quiz | gemeinnuetzig.li</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gm: { 50:'#f0faf4', 100:'#d8f0e3', 200:'#a8d9bf', 400:'#52a87a', 500:'#3d9162', 600:'#2d6a4f', 700:'#1e5239', 800:'#133527', 900:'#0b2018' },
            gold: '#c9983a',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Tile cards (≥5 options — sectors, SDGs, engagement) ── */
    .tile-card {
      cursor: pointer;
      border: 2px solid #e5e7eb;
      transition: border-color 0.15s ease, background-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
    }
    .tile-card:hover {
      border-color: #52a87a;
      background-color: #f0faf4;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(45, 106, 79, 0.12);
    }
    .tile-card.selected {
      border-color: #2d6a4f;
      background-color: #2d6a4f;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(45, 106, 79, 0.25);
    }
    .tile-card.selected .tile-label { color: #ffffff; }
    .tile-card.selected .tile-desc  { color: rgba(255,255,255,0.75); }
    .tile-card .tile-check {
      display: none;
      position: absolute;
      top: 10px; right: 10px;
      width: 22px; height: 22px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      align-items: center;
      justify-content: center;
    }
    .tile-card.selected .tile-check { display: flex; }
    .tile-card.disabled-max { opacity: 0.35; pointer-events: none; }

    /* ── List cards (≤4 options — single choice questions) ── */
    .list-card {
      cursor: pointer;
      border: 2px solid #e5e7eb;
      transition: border-color 0.15s ease, background-color 0.15s ease, box-shadow 0.15s ease;
    }
    .list-card:hover {
      border-color: #52a87a;
      background-color: #f0faf4;
      box-shadow: 0 4px 12px rgba(45, 106, 79, 0.1);
    }
    .list-card.selected {
      border-color: #2d6a4f;
      background-color: #d8f0e3;
      box-shadow: 0 4px 12px rgba(45, 106, 79, 0.15);
    }
    .list-card .list-check { display: none; }
    .list-card.selected .list-check { display: flex; }
    .list-card.disabled-max { opacity: 0.35; pointer-events: none; }

    /* ── Step progress dots ── */
    .step-dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .step-dot.completed {
      background-color: #2d6a4f; color: white;
    }
    .step-dot.active {
      background-color: #2d6a4f; color: white;
      box-shadow: 0 0 0 5px rgba(45, 106, 79, 0.18);
    }
    .step-dot.upcoming {
      background-color: #d8f0e3; color: #3d9162;
    }
    .step-line {
      flex: 1; height: 2px;
      background-color: #d8f0e3;
      transition: background-color 0.35s ease;
    }
    .step-line.done { background-color: #2d6a4f; }

    /* ── Misc animations ── */
    .step-enter { animation: fadeSlideIn 0.28s ease both; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(14px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .btn-spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gm-50 font-sans min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gm-100 px-6 py-3.5 flex items-center justify-between sticky top-0 z-30 shadow-sm">
    <a href="/" class="flex items-center gap-2 text-gm-700 hover:text-gm-600 transition-colors group">
      <svg class="w-5 h-5 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      <span class="font-semibold text-sm">gemeinnuetzig.li</span>
    </a>
    <span class="text-sm font-semibold text-gm-600">NGO Match</span>
  </nav>

  <!-- Step progress bar -->
  <div class="bg-white border-b border-gm-100">
    <div class="max-w-3xl mx-auto px-6 py-4">
      <!-- Desktop: numbered step dots -->
      <div class="hidden sm:flex items-center" id="stepProgress"></div>
      <!-- Mobile: text + thin bar -->
      <div class="sm:hidden">
        <div class="flex justify-between mb-2">
          <span id="stepCounterMobile" class="text-xs font-semibold text-gm-700">Step 1 of 8</span>
          <span id="stepPctMobile" class="text-xs text-gray-400">13%</span>
        </div>
        <div class="bg-gm-100 rounded-full h-1.5">
          <div id="progressFillMobile" class="bg-gm-600 h-1.5 rounded-full transition-all duration-500" style="width:13%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quiz area -->
  <main class="max-w-3xl mx-auto px-6 py-10">
    <div id="quizContainer"></div>

    <!-- Navigation buttons -->
    <div class="flex items-center justify-between mt-10">
      <button id="backBtn" onclick="Quiz.back()"
        class="hidden text-sm text-gray-500 hover:text-gm-700 font-medium flex items-center gap-2 transition-colors px-4 py-2.5 rounded-xl hover:bg-gm-100">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        Back
      </button>
      <div class="ml-auto">
        <button id="nextBtn" onclick="Quiz.next()" disabled
          class="bg-gm-600 disabled:bg-gray-200 disabled:text-gray-400 disabled:shadow-none hover:bg-gm-700 text-white font-semibold px-8 py-3 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
          <span id="nextBtnText">Continue</span>
          <svg id="nextArrow" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
          <svg id="nextSpinner" class="hidden w-4 h-4 btn-spinner" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <script src="/js/quiz.js"></script>
</body>
</html>
