server {
    listen              443 ssl;
    listen              [::]:443 ssl;
    http2               on;
    server_name         sos-kf-prototype.mst.co.cz;

    ssl_certificate     /etc/letsencrypt/live/sos-kf-prototype.mst.co.cz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sos-kf-prototype.mst.co.cz/privkey.pem;

    gzip                on;
    gzip_vary           on;
    gzip_min_length     1024;
    gzip_proxied        any;
    gzip_types          text/plain text/css application/json application/javascript
                        text/xml application/xml application/xml+rss text/javascript
                        image/svg+xml;

    client_max_body_size 10m;
    proxy_http_version   1.1;

    location / {
        proxy_pass         http://sos-kf-prototype-web:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
