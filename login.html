<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>keirxn — Sign in</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script>(function(){var t=localStorage.getItem('keirxn_theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .login-card {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 40px 40px 36px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.06);
    }

    .login-logo {
      font-size: 0.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: #111111;
      margin-bottom: 32px;
    }

    .login-heading {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #111111;
      margin-bottom: 6px;
    }

    .login-subtext {
      font-size: 0.82rem;
      color: #888888;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #333333;
      margin-bottom: 7px;
    }

    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #111111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .form-input:focus {
      border-color: #111111;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
    }
    .form-input.error {
      border-color: #e53935;
      box-shadow: 0 0 0 3px rgba(229,57,53,0.08);
    }

    .login-btn {
      width: 100%;
      padding: 11px 20px;
      background: #111111;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 0.88rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-btn:hover:not(:disabled) { background: #222222; }
    .login-btn:active:not(:disabled) { transform: scale(0.99); }
    .login-btn:disabled { background: #888888; cursor: not-allowed; }

    .login-error {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #c62828;
      font-weight: 500;
      min-height: 18px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .theme-toggle-login {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 34px;
      height: 34px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      background: #fff;
      color: #999;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.12s, border-color 0.12s;
      z-index: 50;
    }
    .theme-toggle-login:hover { color: #111; border-color: #ccc; }

    [data-theme="dark"] body           { background: #0d0d0d; }
    [data-theme="dark"] .login-card    { background: #161616; border-color: #242424; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
    [data-theme="dark"] .login-logo    { color: #efefef; }
    [data-theme="dark"] .login-heading { color: #efefef; }
    [data-theme="dark"] .login-subtext { color: #555; }
    [data-theme="dark"] .form-label    { color: #909090; }
    [data-theme="dark"] .form-input    { background: #1a1a1a; border-color: #2f2f2f; color: #efefef; }
    [data-theme="dark"] .form-input:focus { border-color: #efefef; background: #1a1a1a; box-shadow: 0 0 0 3px rgba(255,255,255,0.06); }
    [data-theme="dark"] .login-btn     { background: #efefef; color: #111; }
    [data-theme="dark"] .login-btn:hover:not(:disabled) { background: #d8d8d8; }
    [data-theme="dark"] .login-error   { color: #f87171; }
    [data-theme="dark"] .theme-toggle-login { background: #161616; border-color: #242424; color: #555; }
    [data-theme="dark"] .theme-toggle-login:hover { color: #efefef; }
  </style>
</head>
<body>

<button class="theme-toggle-login" id="theme-toggle" title="Toggle dark mode"></button>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">keirxn</div>
    <h1 class="login-heading">Sign in</h1>
    <p class="login-subtext">Personal dashboard — sign in to continue</p>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-input"
          type="text"
          id="username"
          name="username"
          autocomplete="username"
          placeholder="Enter username"
          required
          spellcheck="false"
          autocapitalize="none"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          placeholder="Enter password"
          required
        >
      </div>

      <button class="login-btn" type="submit" id="login-btn">
        Continue
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
        </svg>
      </button>

      <div class="login-error" id="login-error" role="alert" aria-live="polite"></div>
    </form>

  </div>
</div>

<script src="static/auth.js"></script>
<script>
  // Dark mode toggle
  (function() {
    const MOON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    const SUN  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    const btn = document.getElementById('theme-toggle');
    const apply = t => { document.documentElement.setAttribute('data-theme', t); btn.innerHTML = t === 'dark' ? SUN : MOON; };
    apply(localStorage.getItem('keirxn_theme') || 'light');
    btn.addEventListener('click', () => {
      const next = (document.documentElement.getAttribute('data-theme') || 'light') === 'dark' ? 'light' : 'dark';
      localStorage.setItem('keirxn_theme', next);
      apply(next);
    });
  })();

  // Already logged in — skip straight to recipes
  if (AUTH.verify()) window.location.replace('index.html');

  const form      = document.getElementById('login-form');
  const usernameEl = document.getElementById('username');
  const passwordEl = document.getElementById('password');
  const btn       = document.getElementById('login-btn');
  const errorEl   = document.getElementById('login-error');

  const setError = msg => {
    errorEl.textContent = msg;
    usernameEl.classList.toggle('error', !!msg);
    passwordEl.classList.toggle('error', !!msg);
  };

  form.addEventListener('submit', async e => {
    e.preventDefault();
    setError('');

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';

    try {
      await AUTH.login(usernameEl.value.trim(), passwordEl.value);
      window.location.replace('index.html');
    } catch {
      setError('Incorrect username or password.');
      btn.disabled = false;
      btn.innerHTML = `Continue <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;
      passwordEl.value = '';
      passwordEl.focus();
    }
  });

  [usernameEl, passwordEl].forEach(el => el.addEventListener('input', () => setError('')));
</script>
</body>
</html>
